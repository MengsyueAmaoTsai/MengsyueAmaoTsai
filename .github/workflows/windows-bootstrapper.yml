name: Windows Bootstrapper CI/CD

on:
  pull_request:
    paths:
      - "Bootstrappers/Windows/**"
      - ".github/workflows/windows-bootstrapper.yml"
  push:
    branches: [ "develop", "master" ]
    tags: [ "v*" ]
    paths:
      - "Bootstrappers/Windows/**"
      - ".github/workflows/windows-bootstrapper.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ci:
    name: CI - Lint & Validate PowerShell
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: PowerShell syntax check
        shell: pwsh
        run: |
          $files = Get-ChildItem "Bootstrappers/Windows" -Recurse -Filter *.ps1
          if (-not $files) { throw "No .ps1 files found in Bootstrappers/Windows" }

          foreach ($f in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($f.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $msg = ($errors | ForEach-Object { $_.Message }) -join "; "
              throw "Syntax error in $($f.FullName): $msg"
            }
            Write-Host "OK: $($f.FullName)"
          }

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -Repository PSGallery

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $result = Invoke-ScriptAnalyzer -Path "Bootstrappers/Windows" -Recurse -Severity Error,Warning
          if ($result) {
            $result | Format-Table -AutoSize
            throw "PSScriptAnalyzer found issues."
          }

  package:
    name: Package windows-bootstrapper.zip
    runs-on: windows-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4

      - name: Create zip and checksum
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          if (Test-Path "out/windows-bootstrapper.zip") { Remove-Item "out/windows-bootstrapper.zip" -Force }

          Compress-Archive -Path "Bootstrappers/Windows/*" -DestinationPath "out/windows-bootstrapper.zip" -Force
          $hash = (Get-FileHash "out/windows-bootstrapper.zip" -Algorithm SHA256).Hash
          Set-Content -Path "out/windows-bootstrapper.zip.sha256" -Value $hash -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-bootstrapper
          path: out/*

  release:
    name: Release (tag only)
    runs-on: windows-latest
    needs: package
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-bootstrapper
          path: out

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/windows-bootstrapper.zip
            out/windows-bootstrapper.zip.sha256
          generate_release_notes: true